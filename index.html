<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistemas Energéticos en Natación</title>
  <style>
    /* ─── Reset & variables ─── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-primary: #0077b6;
      --color-secondary: #00b4d8;
      --color-accent: #90e0ef;
      --color-bg: #f0f8ff;
      --color-surface: #ffffff;
      --color-text: #1a1a2e;
      --color-text-muted: #555;
      --nav-height: 60px;
      --max-width: 1100px;
      --radius: 8px;
      --shadow: 0 2px 12px rgba(0, 119, 182, 0.12);
      --transition: 0.25s ease;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
    }

    /* ─── Navigation ─── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--nav-height);
      background-color: var(--color-primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      z-index: 1000;
      box-shadow: var(--shadow);
    }

    nav .nav-brand {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }

    nav ul li a {
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      opacity: 0.85;
      transition: opacity var(--transition);
    }

    nav ul li a:hover,
    nav ul li a.active {
      opacity: 1;
      text-decoration: underline;
    }

    /* ─── Main content ─── */
    main#content {
      margin-top: var(--nav-height);
      min-height: calc(100vh - var(--nav-height) - 60px);
      max-width: var(--max-width);
      width: 100%;
      margin-left: auto;
      margin-right: auto;
      padding: 2rem 1.5rem;
    }

    /* ─── Footer ─── */
    footer {
      background-color: var(--color-primary);
      color: rgba(255, 255, 255, 0.8);
      text-align: center;
      padding: 1rem 2rem;
      font-size: 0.85rem;
    }

    footer a {
      color: var(--color-accent);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* ─── Utilities (disponibles para secciones futuras) ─── */
    .card {
      background: var(--color-surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.5rem;
    }

    .section-title {
      font-size: 1.6rem;
      color: var(--color-primary);
      margin-bottom: 1rem;
      border-bottom: 3px solid var(--color-secondary);
      padding-bottom: 0.4rem;
    }

    .btn {
      display: inline-block;
      padding: 0.55rem 1.2rem;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background-color var(--transition), transform var(--transition);
    }

    .btn-primary {
      background-color: var(--color-primary);
      color: #fff;
    }

    .btn-primary:hover {
      background-color: var(--color-secondary);
      transform: translateY(-1px);
    }

    /* ─── Responsive ─── */
    @media (max-width: 640px) {
      nav ul {
        gap: 0.8rem;
      }

      nav .nav-brand {
        font-size: 0.95rem;
      }

      main#content {
        padding: 1.5rem 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- ═══ Navigation ═══ -->
  <nav>
    <span class="nav-brand">Sistemas Energéticos en Natación</span>
    <ul>
      <!-- Los ítems del menú se añadirán aquí -->
    </ul>
  </nav>

  <!-- ═══ Main content ═══ -->
  <main id="content">
    <!-- Las secciones del TFG se insertarán aquí -->
  </main>

  <!-- ═══ Footer ═══ -->
  <footer>
    <!-- Información del pie de página se añadirá aquí -->
  </footer>

  <script>
    // ─── App entry point ───
    // Todo el JavaScript interactivo irá aquí
  </script>

</body>
</html>
